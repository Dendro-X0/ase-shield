# Publish privacy policy for store submission (GitHub Pages).
# Enable in repo Settings → Pages → Source: GitHub Actions.

name: Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/privacy.html'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site
          cp docs/privacy.html _site/index.html
          cp docs/privacy.html _site/privacy.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
