name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build workspace
        run: pnpm build

      - name: Test
        run: pnpm test

  package-extension:
    needs: verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install and build
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Package extension zip
        run: pnpm package:extension

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: dist/release/*.zip
          if-no-files-found: error

  companion-bundle:
    needs: verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/companion/src-tauri

      - name: Install and build
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build companion NSIS bundle
        run: pnpm --filter @ase/companion tauri:build

      - name: Sign installer (optional)
        continue-on-error: true
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE) {
            Write-Host "WINDOWS_CERTIFICATE not set — skipping sign step."
            exit 0
          }
          ./scripts/sign-installer.ps1

      - name: Upload companion installer
        uses: actions/upload-artifact@v4
        with:
          name: companion-installer
          path: apps/companion/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  github-release:
    needs: [package-extension, companion-bundle]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release assets and checksums
        run: |
          node scripts/stage-release-assets.mjs \
            artifacts/extension-zip \
            artifacts/companion-installer \
            release-assets

      - name: Verify release notes file
        run: |
          NOTES="docs/releases/${GITHUB_REF_NAME}.md"
          if [ ! -f "$NOTES" ]; then
            echo "::error::Missing release notes at $NOTES"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: docs/releases/${{ github.ref_name }}.md
          fail_on_unmatched_files: true
          files: |
            release-assets/*
