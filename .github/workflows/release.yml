name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  package-extension:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install and build
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          pnpm test

      - name: Package extension zip
        run: pnpm package:extension

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: dist/release/*.zip

  companion-bundle:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/companion/src-tauri

      - name: Install and build
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build companion NSIS bundle
        run: pnpm --filter @ase/companion tauri:build

      - name: Sign installer (optional)
        if: ${{ secrets.WINDOWS_CERTIFICATE != '' }}
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: ./scripts/sign-installer.ps1

      - name: Upload companion installer
        uses: actions/upload-artifact@v4
        with:
          name: companion-installer
          path: apps/companion/src-tauri/target/release/bundle/nsis/*.exe

  github-release:
    needs: [package-extension, companion-bundle]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/extension-zip/*
            artifacts/companion-installer/*
          generate_release_notes: true
